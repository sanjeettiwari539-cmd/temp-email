<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DropMail — Instant Private Inbox</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #111118; --card: #16161f; --border: #2a2a3a;
    --accent: #00ffaa; --accent2: #7b5ea7; --text: #e8e8f0; --muted: #6b6b80;
    --danger: #ff4d6d; --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(0,255,170,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,255,170,0.03) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }
  .orb1 { position:fixed; width:600px; height:600px; background:radial-gradient(circle,rgba(0,255,170,0.06) 0%,transparent 70%); top:-200px; right:-200px; pointer-events:none; z-index:0; }
  .orb2 { position:fixed; width:400px; height:400px; background:radial-gradient(circle,rgba(123,94,167,0.08) 0%,transparent 70%); bottom:-100px; left:-100px; pointer-events:none; z-index:0; }
  .container { max-width:820px; margin:0 auto; padding:40px 20px; position:relative; z-index:1; }

  header { text-align:center; margin-bottom:48px; animation:fadeDown 0.6s ease both; }
  .logo { display:inline-flex; align-items:center; gap:10px; margin-bottom:12px; }
  .logo-icon { width:42px; height:42px; background:var(--accent); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; box-shadow:0 0 20px rgba(0,255,170,0.4); }
  .logo h1 { font-size:2rem; font-weight:800; letter-spacing:-1px; }
  .logo h1 span { color:var(--accent); }
  header p { color:var(--muted); font-size:0.9rem; font-family:var(--mono); }

  .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:28px; margin-bottom:24px; animation:fadeUp 0.6s 0.1s ease both; position:relative; overflow:hidden; }
  .card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .label { font-family:var(--mono); font-size:0.7rem; color:var(--accent); letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; }

  .email-display { display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; margin-bottom:16px; }
  #emailDisplay { font-family:var(--mono); font-size:1.05rem; font-weight:700; color:var(--accent); flex:1; word-break:break-all; }
  #emailDisplay.loading { color:var(--muted); animation:pulse 1.5s infinite; }

  .row { display:flex; gap:10px; margin-bottom:16px; }
  input.custom { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; font-family:var(--mono); font-size:0.9rem; color:var(--text); outline:none; transition:border-color 0.2s; }
  input.custom:focus { border-color:var(--accent); }
  input.custom::placeholder { color:var(--muted); }
  .domain-tag { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; font-family:var(--mono); font-size:0.9rem; color:var(--accent); display:flex; align-items:center; white-space:nowrap; }

  .btn-row { display:flex; gap:10px; flex-wrap:wrap; }
  .btn { display:flex; align-items:center; gap:8px; padding:11px 20px; border-radius:9px; font-family:var(--sans); font-size:0.85rem; font-weight:600; cursor:pointer; border:none; transition:all 0.2s; }
  .btn-p { background:var(--accent); color:#000; flex:1; }
  .btn-p:hover { background:#00e699; box-shadow:0 0 20px rgba(0,255,170,0.3); transform:translateY(-1px); }
  .btn-g { background:transparent; color:var(--text); border:1px solid var(--border); }
  .btn-g:hover { border-color:var(--muted); background:var(--surface); }
  .btn-d { background:transparent; color:var(--danger); border:1px solid rgba(255,77,109,0.3); }
  .btn-d:hover { background:rgba(255,77,109,0.1); }
  .btn:active { transform:scale(0.97); }
  .btn:disabled { opacity:0.5; cursor:not-allowed; transform:none!important; }

  .status-bar { display:flex; align-items:center; gap:8px; margin-bottom:24px; padding:12px 18px; background:var(--card); border:1px solid var(--border); border-radius:10px; font-family:var(--mono); font-size:0.78rem; color:var(--muted); animation:fadeUp 0.6s 0.2s ease both; }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; }
  .dot.on { background:var(--accent); box-shadow:0 0 8px var(--accent); animation:blink 2s infinite; }
  .status-bar .ri { margin-left:auto; color:var(--accent); }

  .inbox-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; animation:fadeUp 0.6s 0.3s ease both; }
  .inbox-title { font-size:1rem; font-weight:800; display:flex; align-items:center; gap:10px; }
  .badge { background:var(--accent); color:#000; font-family:var(--mono); font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:20px; min-width:24px; text-align:center; }
  .badge.e { background:var(--border); color:var(--muted); }

  .mail-item { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:18px 20px; cursor:pointer; transition:all 0.2s; position:relative; overflow:hidden; margin-bottom:10px; }
  .mail-item:hover { border-color:var(--accent); transform:translateX(4px); box-shadow:-4px 0 0 var(--accent); }
  .mail-item.unread::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent); }
  .mail-from { font-size:0.85rem; font-weight:600; margin-bottom:4px; display:flex; align-items:center; justify-content:space-between; }
  .mail-time { font-family:var(--mono); font-size:0.72rem; color:var(--muted); }
  .mail-subject { font-family:var(--mono); font-size:0.82rem; color:var(--accent); margin-bottom:6px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .mail-preview { font-size:0.8rem; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

  .empty { text-align:center; padding:60px 20px; color:var(--muted); background:var(--card); border:1px dashed var(--border); border-radius:12px; }
  .empty-icon { font-size:3rem; margin-bottom:16px; opacity:0.5; }
  .empty h3 { font-size:1rem; margin-bottom:8px; color:var(--text); }
  .empty p { font-family:var(--mono); font-size:0.78rem; line-height:1.8; }

  .overlay { position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); z-index:100; display:none; align-items:center; justify-content:center; padding:20px; }
  .overlay.open { display:flex; animation:fadeIn 0.2s ease; }
  .modal { background:var(--card); border:1px solid var(--border); border-radius:16px; width:100%; max-width:640px; max-height:80vh; overflow:hidden; display:flex; flex-direction:column; animation:scaleIn 0.2s ease; position:relative; }
  .modal::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,var(--accent),var(--accent2)); }
  .modal-hd { padding:24px 24px 16px; border-bottom:1px solid var(--border); }
  .modal-subject { font-size:1.1rem; font-weight:800; margin-bottom:10px; line-height:1.3; }
  .modal-meta { display:flex; flex-wrap:wrap; gap:16px; font-family:var(--mono); font-size:0.75rem; color:var(--muted); }
  .modal-meta strong { color:var(--accent); }
  .modal-body { flex:1; overflow-y:auto; padding:24px; font-size:0.88rem; line-height:1.7; }
  .modal-body pre { white-space:pre-wrap; font-family:var(--mono); font-size:0.82rem; background:var(--surface); padding:16px; border-radius:8px; border:1px solid var(--border); }
  .modal-ft { padding:16px 24px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; }

  .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--accent); color:#000; font-family:var(--mono); font-size:0.82rem; font-weight:700; padding:12px 24px; border-radius:30px; opacity:0; transition:all 0.3s; pointer-events:none; z-index:200; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  ::-webkit-scrollbar { width:6px; }
  ::-webkit-scrollbar-track { background:var(--surface); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes scaleIn { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
  @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  .spin { display:inline-block; animation:spin 1s linear infinite; }

  @media(max-width:520px) {
    .row { flex-direction:column; }
    .btn-row { flex-direction:column; }
    .btn-p { flex:none; }
    #emailDisplay { font-size:0.88rem; }
  }
</style>
</head>
<body>
<div class="orb1"></div><div class="orb2"></div>

<div class="container">
  <header>
    <div class="logo">
      <div class="logo-icon">📬</div>
      <h1>Drop<span>Mail</span></h1>
    </div>
    <p>// instant disposable inbox — no signup, no traces</p>
  </header>

  <div class="card">
    <div class="label">▸ Your Temp Email Address</div>
    <div class="email-display">
      <span id="emailDisplay" class="loading">Creating inbox...</span>
      <button class="btn btn-g" onclick="copyEmail()" style="padding:8px 14px;" title="Copy">📋</button>
    </div>
    <div class="row">
      <input type="text" class="custom" id="customName" placeholder="custom username (optional)" maxlength="30" oninput="this.value=this.value.toLowerCase().replace(/[^a-z0-9._-]/g,'')"/>
      <div class="domain-tag" id="domainTag">@loading...</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-p" onclick="applyCustom()" id="applyBtn">✦ Set This Email</button>
      <button class="btn btn-g" onclick="generateRandom()" id="randomBtn">⟳ Random</button>
      <button class="btn btn-d" onclick="clearAll()">✕ Delete</button>
    </div>
  </div>

  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="statusText">Initializing...</span>
    <span class="ri" id="ri">Auto-refresh: 5s</span>
  </div>

  <div class="inbox-hd">
    <div class="inbox-title">Inbox <span class="badge e" id="badge">0</span></div>
    <button class="btn btn-g" onclick="fetchMails(true)" id="refreshBtn" style="padding:9px 16px;font-size:0.82rem;">⟳ Refresh</button>
  </div>

  <div id="mailBox">
    <div class="empty"><div class="empty-icon">📭</div><h3>Inbox is empty</h3><p>Copy the email above and use it anywhere.<br>Messages will appear here automatically.</p></div>
  </div>
</div>

<!-- Modal -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-subject" id="mSubject">—</div>
      <div class="modal-meta">
        <span>From: <strong id="mFrom">—</strong></span>
        <span>Date: <strong id="mDate">—</strong></span>
      </div>
    </div>
    <div class="modal-body" id="mBody"></div>
    <div class="modal-ft"><button class="btn btn-g" onclick="closeModal()">✕ Close</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const BASE = 'https://api.mail.tm';
let token = '', accountId = '', currentEmail = '', domain = '';
let mails = [], readIds = new Set();
let refreshTimer = null, countdownTimer = null, countdown = 5;

async function init() {
  try {
    const r = await fetch(`${BASE}/domains`);
    const d = await r.json();
    const list = d['hydra:member'];
    if (!list?.length) throw new Error('No domains available');
    domain = list[0].domain;
    document.getElementById('domainTag').textContent = `@${domain}`;
    await generateRandom();
  } catch(e) {
    setStatus(false, 'Connection failed. Check internet.');
    showToast('⚠ Could not reach mail server');
  }
}

async function generateRandom() {
  setLoading(true);
  const user = rnd(10);
  const pass = rnd(16);
  await createAccount(`${user}@${domain}`, pass);
  setLoading(false);
}

async function applyCustom() {
  const name = document.getElementById('customName').value.trim();
  if (!name) { showToast('Please enter a username!'); return; }
  setLoading(true);
  await createAccount(`${name}@${domain}`, rnd(16));
  setLoading(false);
}

async function createAccount(address, password) {
  try {
    const r1 = await fetch(`${BASE}/accounts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ address, password })
    });

    if (!r1.ok) {
      const e = await r1.json();
      const msg = e['hydra:description'] || '';
      if (msg.toLowerCase().includes('already')) {
        const [u] = address.split('@');
        return createAccount(`${u}${rnd(4)}@${domain}`, password);
      }
      throw new Error(msg || 'Registration failed');
    }

    const r2 = await fetch(`${BASE}/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ address, password })
    });

    if (!r2.ok) throw new Error('Auth failed');
    const auth = await r2.json();
    token = auth.token;
    accountId = auth.id;
    currentEmail = address;

    document.getElementById('emailDisplay').textContent = address;
    document.getElementById('emailDisplay').classList.remove('loading');
    setStatus(true, `Active: ${address}`);
    mails = []; readIds = new Set();
    renderMails();
    startAutoRefresh();
    fetchMails();

  } catch(e) {
    showToast('⚠ ' + (e.message || 'Error'));
    setStatus(false, e.message || 'Error creating inbox');
  }
}

async function fetchMails(manual = false) {
  if (!token) return;
  if (manual) {
    const b = document.getElementById('refreshBtn');
    b.innerHTML = '<span class="spin">⟳</span> Refreshing';
    b.disabled = true;
  }
  try {
    const r = await fetch(`${BASE}/messages?page=1`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!r.ok) throw new Error();
    const d = await r.json();
    const newMails = d['hydra:member'] || [];
    if (newMails.length > mails.length && mails.length > 0)
      showToast(`📬 ${newMails.length - mails.length} new message!`);
    mails = newMails;
    renderMails();
    setStatus(true, `Active: ${currentEmail}`);
  } catch {
    setStatus(false, 'Reconnecting...');
  }
  if (manual) {
    setTimeout(() => {
      const b = document.getElementById('refreshBtn');
      b.innerHTML = '⟳ Refresh'; b.disabled = false;
    }, 800);
  }
  resetCountdown();
}

async function openMail(id) {
  readIds.add(id); renderMails();
  document.getElementById('mSubject').textContent = 'Loading...';
  document.getElementById('mBody').innerHTML = '<p style="color:var(--muted);font-family:var(--mono)">Fetching...</p>';
  document.getElementById('overlay').classList.add('open');
  try {
    const r = await fetch(`${BASE}/messages/${id}`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    const m = await r.json();
    document.getElementById('mSubject').textContent = m.subject || '(No Subject)';
    document.getElementById('mFrom').textContent = m.from?.address || '—';
    document.getElementById('mDate').textContent = formatTime(m.createdAt);
    if (m.html?.length) {
      const iframe = document.createElement('iframe');
      iframe.style.cssText = 'width:100%;border:none;min-height:300px;background:#fff;border-radius:8px;';
      iframe.srcdoc = m.html.join('');
      document.getElementById('mBody').innerHTML = '';
      document.getElementById('mBody').appendChild(iframe);
    } else {
      document.getElementById('mBody').innerHTML = `<pre>${esc(m.text || '(Empty)')}</pre>`;
    }
  } catch {
    document.getElementById('mBody').innerHTML = '<p style="color:var(--danger)">Failed to load.</p>';
  }
}

function renderMails() {
  const n = mails.length;
  const badge = document.getElementById('badge');
  badge.textContent = n; badge.className = `badge${n===0?' e':''}`;
  const box = document.getElementById('mailBox');
  if (!n) {
    box.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><h3>Inbox is empty</h3><p>Copy the email above and use it anywhere.<br>Messages will appear here automatically.</p></div>';
    return;
  }
  box.innerHTML = mails.map(m => `
    <div class="mail-item${!readIds.has(m.id)?' unread':''}" onclick="openMail('${m.id}')">
      <div class="mail-from"><span>📨 ${esc(m.from?.address||'Unknown')}</span><span class="mail-time">${formatTime(m.createdAt)}</span></div>
      <div class="mail-subject">${esc(m.subject||'(No Subject)')}</div>
      <div class="mail-preview">${esc(m.intro||'Click to read...')}...</div>
    </div>`).join('');
}

function startAutoRefresh() {
  clearInterval(refreshTimer); clearInterval(countdownTimer);
  resetCountdown();
  refreshTimer = setInterval(() => fetchMails(), 5000);
}

function resetCountdown() {
  clearInterval(countdownTimer); countdown = 5; tick();
  countdownTimer = setInterval(() => { countdown--; if(countdown<=0) countdown=5; tick(); }, 1000);
}

function tick() { document.getElementById('ri').textContent = `Auto-refresh: ${countdown}s`; }

function clearAll() {
  clearInterval(refreshTimer); clearInterval(countdownTimer);
  token=''; accountId=''; currentEmail=''; mails=[];
  document.getElementById('emailDisplay').textContent='No email — click Random or Set';
  document.getElementById('emailDisplay').classList.add('loading');
  document.getElementById('customName').value='';
  setStatus(false,'Inbox cleared');
  document.getElementById('ri').textContent='Auto-refresh: off';
  document.getElementById('badge').textContent='0';
  document.getElementById('badge').className='badge e';
  document.getElementById('mailBox').innerHTML='<div class="empty"><div class="empty-icon">🗑️</div><h3>Inbox deleted</h3><p>Generate a new email to start fresh.</p></div>';
  showToast('Inbox cleared ✓');
}

function setLoading(v) {
  document.getElementById('emailDisplay').classList.toggle('loading',v);
  if(v) document.getElementById('emailDisplay').textContent='Creating inbox...';
  document.getElementById('applyBtn').disabled=v;
  document.getElementById('randomBtn').disabled=v;
}

function setStatus(on, msg) {
  document.getElementById('dot').className=`dot${on?' on':''}`;
  document.getElementById('statusText').textContent=msg;
}

function copyEmail() {
  if(!currentEmail){showToast('No email to copy!');return;}
  navigator.clipboard.writeText(currentEmail)
    .then(()=>showToast('📋 Copied: '+currentEmail))
    .catch(()=>{
      const el=document.createElement('textarea');
      el.value=currentEmail; document.body.appendChild(el); el.select();
      document.execCommand('copy'); document.body.removeChild(el);
      showToast('📋 Copied!');
    });
}

function closeModal(e) {
  if(!e||e.target===document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatTime(ds) {
  if(!ds) return '—';
  try {
    const d=new Date(ds),now=new Date(),diff=now-d;
    if(diff<60000) return 'Just now';
    if(diff<3600000) return `${Math.floor(diff/60000)}m ago`;
    if(diff<86400000) return `${Math.floor(diff/3600000)}h ago`;
    return d.toLocaleDateString();
  } catch { return ds; }
}

function rnd(n) {
  const c='abcdefghijklmnopqrstuvwxyz0123456789';
  return Array.from({length:n},()=>c[Math.floor(Math.random()*c.length)]).join('');
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });
init();
</script>
</body>
</html>
